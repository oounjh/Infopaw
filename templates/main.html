{% extends "base.html" %}

{% block title %}lnfopaw - 首頁{% endblock %}

{% block content %}
<style>
    body {
    min-height: 100vh;
    position: relative;
  }

  body::before{
    content: "";
    position: fixed; /* 或 absolute */
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url("{{ url_for('static', filename='網站logo_v3.png') }}") center/cover no-repeat fixed;
    opacity: 0.6;  /* 透明度 */
    z-index: -1;   /* 放到文字下面 */
  }

    @keyframes sway {
    0% { transform: rotate(0deg); }
    50% { transform: rotate(10deg); }
    100% { transform: rotate(0deg); }
  }

    #mascot {
    animation: sway 5s infinite;
    transform-origin: bottom center;
    max-width: 120px;
    max-height: 120px;
    width: auto;
    height: auto;
    position: fixed;
    bottom: 10px;
    right: 10px;
    z-index: 1000;
    
  }
</style>
    <img src="{{ url_for('static', filename='mascot2.png')}}" alt="吉祥物" id="mascot" >
    <h1>🐾 歡迎來到lnfopaw！</h1>
    <h2>你可以藉由這個網站看到Pexels的攝影師們捕抓到的動物們!</h2>
    <h2>動物圖片皆是來自 Pexels 網站的圖庫。</h2>
    <h2>遊戲的特價資訊皆以平台為準</h2>
    <h2><li><a href="/gallery">👉 動物圖片瀏覽網站</a></li></h2>
    <h2><li><a href="/freegames">🎮 限免特價遊戲通知頁面</a></li></h2>

{% endblock %}
